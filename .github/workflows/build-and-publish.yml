name: Build & Publish

on:
  push:
    branches: [main]
    paths: [package.json]
  workflow_dispatch:

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if version changed
        id: check
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          echo "version=$CURRENT" >> "$GITHUB_OUTPUT"

          # On workflow_dispatch, always build
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          PREVIOUS=$(git show HEAD~1:package.json 2>/dev/null | node -p "JSON.parse(require('fs').readFileSync(0,'utf8')).version" 2>/dev/null || echo "")
          if [ "$CURRENT" != "$PREVIOUS" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  build-and-upload:
    needs: check-version
    if: needs.check-version.outputs.changed == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build macOS dmg + zip (arm64)
        run: npx electron-builder --mac dmg zip --arm64

      - name: Upload to server
        env:
          VM_SSH_KEY: ${{ secrets.VM_SSH_KEY }}
          VM_HOST: ${{ secrets.VM_HOST }}
          VM_USER: ${{ secrets.VM_USER }}
          REMOTE_DIR: ${{ secrets.VM_REMOTE_DIR }}
        run: |
          # Write SSH key
          mkdir -p ~/.ssh
          echo "$VM_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          # Add host key
          ssh-keyscan -H "$VM_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          SSH_OPTS="-i ~/.ssh/deploy_key -o StrictHostKeyChecking=no"
          REMOTE="$VM_USER@$VM_HOST"

          # Ensure directory exists
          ssh $SSH_OPTS "$REMOTE" "mkdir -p $REMOTE_DIR"

          # Upload update manifest
          scp $SSH_OPTS dist/latest-mac.yml "$REMOTE:$REMOTE_DIR/latest-mac.yml"

          # Upload zip + blockmap (for auto-updater)
          scp $SSH_OPTS dist/*.zip "$REMOTE:$REMOTE_DIR/"
          scp $SSH_OPTS dist/*.zip.blockmap "$REMOTE:$REMOTE_DIR/"

          # Upload dmg (for fresh installs)
          DMG=$(find dist -maxdepth 1 -name '*.dmg' | head -1)
          if [ -n "$DMG" ]; then
            scp $SSH_OPTS "$DMG" "$REMOTE:$REMOTE_DIR/claude-tray-notifier.dmg"
          fi

          # Cleanup
          rm -f ~/.ssh/deploy_key

          echo "Uploaded v${{ needs.check-version.outputs.version }}"

      - name: Upload artifacts to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: claude-tray-notifier-${{ needs.check-version.outputs.version }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/latest-mac.yml
