<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1e1e1e;
      color: #e0e0e0;
      font-size: 13px;
      overflow-y: auto;
      user-select: none;
    }
    .header {
      padding: 12px 16px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header-title {
      font-size: 11px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .connection-status {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 10px;
      color: #666;
    }
    .connection-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #666;
    }
    .connection-dot.connected { background: #4caf50; }
    .connection-dot.disconnected { background: #d47a7a; }
    .tab-bar {
      display: flex;
      border-bottom: 1px solid #333;
      padding: 0 16px;
      margin-top: 8px;
    }
    .tab {
      padding: 6px 12px;
      font-size: 12px;
      color: #888;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
    }
    .tab:hover { color: #bbb; }
    .tab.active {
      color: #e0e0e0;
      border-bottom-color: #c4944a;
    }
    .panel { display: none; }
    .panel.active { display: block; }
    .empty {
      padding: 40px 16px;
      text-align: center;
      color: #666;
    }
    /* Notifications */
    .notification {
      padding: 10px 16px;
      border-bottom: 1px solid #2a2a2a;
      cursor: default;
    }
    .notification:hover { background: #2a2a2a; }
    .notification.unread { border-left: 3px solid #c4944a; }
    .notification .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
    }
    .notification .conv-title {
      font-weight: 600;
      font-size: 13px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 260px;
    }
    .notification .time {
      font-size: 11px;
      color: #888;
      flex-shrink: 0;
      margin-left: 8px;
    }
    .notification .meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 2px;
    }
    .notification .type {
      display: inline-block;
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 3px;
      font-weight: 500;
    }
    .notification .project-tag {
      font-size: 10px;
      color: #666;
    }
    .type-done     { background: #1a2a1a; color: #7ab87a; }
    .type-choice   { background: #2a1a3a; color: #b49adb; }
    .type-question { background: #1a2a3a; color: #7aaed4; }
    .type-approval { background: #2a2a1a; color: #c4b44a; }
    .type-error    { background: #3a1a1a; color: #d47a7a; }
    .type-input    { background: #3a2a1a; color: #c4944a; }
    .notification .summary {
      font-size: 12px;
      color: #888;
      margin-top: 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    /* Sessions */
    .session-item {
      padding: 10px 16px;
      border-bottom: 1px solid #2a2a2a;
      cursor: pointer;
    }
    .session-item:hover { background: #2a2a2a; }
    .session-top {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 3px;
    }
    .session-status {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .session-status.active { background: #4caf50; }
    .session-status.idle { background: #666; }
    .session-project {
      font-weight: 600;
      font-size: 13px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .session-time {
      font-size: 11px;
      color: #888;
      flex-shrink: 0;
      margin-left: auto;
    }
    .session-conv-title {
      font-size: 12px;
      color: #888;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      padding-left: 16px;
    }
    .session-count {
      font-size: 10px;
      color: #666;
      padding-left: 16px;
      margin-top: 2px;
    }
    /* Footer */
    .footer {
      padding: 8px 16px;
      border-top: 1px solid #333;
      display: flex;
      justify-content: space-between;
    }
    .footer button {
      background: none;
      border: 1px solid #444;
      color: #aaa;
      padding: 4px 12px;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
    }
    .footer button:hover { background: #333; color: #fff; }
  </style>
</head>
<body>
  <div class="header">
    <span class="header-title">Claude Code</span>
    <div class="connection-status">
      <span class="connection-dot" id="conn-dot"></span>
      <span id="conn-label">Connecting...</span>
    </div>
  </div>
  <div class="tab-bar">
    <div class="tab active" data-tab="notifications">Notifications</div>
    <div class="tab" data-tab="sessions">Sessions</div>
  </div>
  <div id="notifications-panel" class="panel active">
    <div id="list"><div class="empty">No notifications yet</div></div>
  </div>
  <div id="sessions-panel" class="panel">
    <div id="sessions-list"><div class="empty">No sessions yet</div></div>
  </div>
  <div class="footer">
    <button id="clear">Clear All</button>
    <button id="quit">Quit</button>
  </div>
  <script src="renderer.js"></script>
</body>
</html>
