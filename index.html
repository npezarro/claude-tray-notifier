<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1e1e1e;
      color: #e0e0e0;
      font-size: 13px;
      overflow-y: auto;
      user-select: none;
    }
    .header {
      padding: 12px 16px 8px;
      font-size: 11px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid #333;
    }
    .empty {
      padding: 40px 16px;
      text-align: center;
      color: #666;
    }
    .notification {
      padding: 10px 16px;
      border-bottom: 1px solid #2a2a2a;
      cursor: default;
    }
    .notification:hover { background: #2a2a2a; }
    .notification .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 3px;
    }
    .notification .project {
      font-weight: 600;
      font-size: 13px;
    }
    .notification .time {
      font-size: 11px;
      color: #888;
    }
    .notification .type {
      display: inline-block;
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 3px;
      font-weight: 500;
    }
    .type-response { background: #1a3a2a; color: #4ade80; }
    .type-input { background: #3a2a1a; color: #fbbf24; }
    .notification .summary {
      font-size: 12px;
      color: #aaa;
      margin-top: 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .footer {
      padding: 8px 16px;
      border-top: 1px solid #333;
      display: flex;
      justify-content: space-between;
    }
    .footer button {
      background: none;
      border: 1px solid #444;
      color: #aaa;
      padding: 4px 12px;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
    }
    .footer button:hover { background: #333; color: #fff; }
  </style>
</head>
<body>
  <div class="header">Claude Code Notifications</div>
  <div id="list"><div class="empty">No notifications yet</div></div>
  <div class="footer">
    <button id="clear">Clear All</button>
    <button id="quit">Quit</button>
  </div>
  <script src="renderer.js"></script>
</body>
</html>
